<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chinese Learning - Xiaohongshu Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1920px;
            background: #fafafa;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            padding: 80px 70px;
            position: relative;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .vocab-item {
            padding: 18px 0;
            border-bottom: 1px solid rgba(0,0,0,0.08);
        }

        .vocab-item:last-child {
            border-bottom: none;
        }

        .vocab-header {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 10px;
        }

        .vocab-number {
            font-size: 42px;
            font-weight: 400;
            color: #000;
            min-width: 40px;
            font-family: 'Pretendard', sans-serif;
        }

        .chinese {
            font-size: 42px;
            font-weight: 400;
            color: #000;
            font-family: 'Noto Sans SC', sans-serif;
        }

        .chinese strong {
            font-weight: 700;
            color: #ff6645;
            margin-left: 2.5px;
            margin-right: 2.5px;
        }

        .pinyin {
            font-size: 36px;
            color: #4fb0ff;
            font-weight: 500;
            margin-left: 8px;
            font-family: 'Pretendard', sans-serif;
        }

        .vocab-details {
            margin-left: 52px;
        }

        .korean {
            font-size: 42px;
            color: #000;
            margin-bottom: 8px;
            font-weight: 500;
            opacity: 0.8;
            font-family: 'Pretendard', sans-serif;
        }

        .example {
            font-size: 36px;
            color: #000;
            font-style: normal;
            font-family: 'Noto Sans SC', sans-serif;
            line-height: 1.5;
            opacity: 0.5;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
        }

        .page-number {
            font-size: 18px;
            color: rgba(0,0,0,0.4);
            font-family: 'Pretendard', sans-serif;
        }
    </style>
</head>
<body>
    <div class="content">
        <!-- VOCAB_ITEMS -->
    </div>

    <div class="footer">
        <div class="page-number"><!-- PAGE_INFO --></div>
    </div>
</body>
</html>
